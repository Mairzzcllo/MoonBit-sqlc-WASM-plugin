version: "2"
plugins:
  - name: "moonbit"
    wasm:
      # Root-level smoke config (out: gen 鈫?writes gen/gen/ when package_name matches).
      # Prefer examples/users/sqlc.yaml for the canonical workflow (see scripts/run-example.ps1).
      # debug (default: moon build --target wasm):
      url: "file://./_build/wasm/debug/build/plugin/plugin.wasm"
      # release (moon build --target wasm --release):
      # url: "file://./_build/wasm/release/build/plugin/plugin.wasm"
      sha256: ""   # optional: pwsh scripts/sync-sqlc-sha256.ps1 after moon build (platform-specific)
sql:
  - schema: "examples/users/schema.sql"
    queries: "examples/users/query.sql"
    engine: "postgresql"
    codegen:
      - out: "gen"
        plugin: "moonbit"
        options:
          package_name: gen
