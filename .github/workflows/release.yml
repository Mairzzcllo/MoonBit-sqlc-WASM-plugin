name: Release

on:
  push:
    tags:
      - "v*"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "shim/**"

permissions:
  contents: write

env:
  MOONBIT_VERSION: "0.1.20260522"
  SQLC_VERSION: "1.31.1"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
        with:
          moonbit-version: ${{ env.MOONBIT_VERSION }}
      - run: moon check
      - run: moon test
      - run: moon build --target wasm --release
      - name: Generate SHA256
        working-directory: _build/wasm/release/build/plugin
        run: sha256sum plugin.wasm > plugin.wasm.sha256
      - name: Install wabt
        run: npm install -g wabt
      - name: Install sqlc
        run: |
          curl -fsSL "https://github.com/sqlc-dev/sqlc/releases/download/v${SQLC_VERSION}/sqlc_${SQLC_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin sqlc
      - name: Run validation script (release WASM)
        shell: pwsh
        run: tests/integration/wasm/validate_plugin.ps1 -TestSqlc -Release -SkipBuild
      - name: Run E2E integration test (release WASM)
        shell: pwsh
        run: tests/integration/e2e/run_e2e.ps1 -SkipBuild -Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            _build/wasm/release/build/plugin/plugin.wasm
            _build/wasm/release/build/plugin/plugin.wasm.sha256
          generate_release_notes: true
