name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "shim/**"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MOONBIT_VERSION: "0.1.20260522"
  SQLC_VERSION: "1.31.1"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
        with:
          moonbit-version: ${{ env.MOONBIT_VERSION }}
      - run: moon check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
        with:
          moonbit-version: ${{ env.MOONBIT_VERSION }}
      - run: moon test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
        with:
          moonbit-version: ${{ env.MOONBIT_VERSION }}
      - run: moon build --target wasm --release
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-wasm
          path: _build/wasm/release/build/plugin/plugin.wasm
          retention-days: 30

  validate:
    needs: [check, test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
        with:
          moonbit-version: ${{ env.MOONBIT_VERSION }}
      - name: Install wabt
        run: npm install -g wabt
      - name: Install sqlc
        run: |
          curl -fsSL "https://github.com/sqlc-dev/sqlc/releases/download/v${SQLC_VERSION}/sqlc_${SQLC_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin sqlc
      - name: Run validation script
        shell: pwsh
        run: tests/integration/wasm/validate_plugin.ps1 -TestSqlc
      - name: Run E2E integration test
        shell: pwsh
        run: tests/integration/e2e/run_e2e.ps1 -SkipBuild
