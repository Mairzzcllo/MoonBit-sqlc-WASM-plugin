name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "shim/**"
      - "scripts/**"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MOONBIT_VERSION: "0.1.20260512"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
        with:
          moonbit-version: ${{ env.MOONBIT_VERSION }}
      - run: moon check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
        with:
          moonbit-version: ${{ env.MOONBIT_VERSION }}
      - run: moon test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
        with:
          moonbit-version: ${{ env.MOONBIT_VERSION }}
      - run: moon build --target wasm
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-wasm
          path: _build/wasm/release/build/plugin/plugin.wasm
          retention-days: 30

  validate:
    needs: [check, test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hustcer/setup-moonbit@v1
        with:
          moonbit-version: ${{ env.MOONBIT_VERSION }}
      - run: moon build --target wasm
      - name: Install wabt
        run: npm install -g wabt
      - name: Run validation script
        shell: pwsh
        run: tests/integration/wasm/validate_plugin.ps1
