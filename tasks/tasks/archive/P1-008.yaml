id: P1-008
title: 修复 validate_plugin.ps1 正则匹配逻辑
priority: P1
type: fix
state: done
description: >-
  validate_plugin.ps1 中 3 处 PowerShell 正则匹配在
  多行 WAT 文本上使用 `-notmatch` 导致假阴性失败：

  - Line 80: `$wat -notmatch "export.*_start"` 不匹配
    `(export "_start" (func ...))` — 字符串前有括号和引号
  - Line 86: `$wat -notmatch "import.*wasi_snapshot_preview1.*fd_read"`
    同样因换行/缩进不匹配
  - Line 91: 重复的 `_start` 检查

  修复方案：改用 `$wat -match '(export "_start"'` 和
  `$wat -match 'wasi_snapshot_preview1.*fd_read'`，
  并添加 PowerShell 兼容性注释。
