schema_version: "1.0"
id: P1-050
state: done
deterministic: true
title: "read_varint 静默截断 — 截断时返回错误而非部分结果"
type: bugfix
priority: P1
description: >
  codec.mbt read_varint (line 109-122) 在 remaining() <= 0 时 break
  返回部分累加值，该值可看似合法小整数（如 1 字节截断返回 104 而非
  真正的 1000）。这导致：
  1. 作为字段号使用时匹配错误字段或触发误跳过
  2. 作为 string/bytes 长度时读太少（后续内容被误解析）或读太多（abort）
  3. 作为嵌入消息长度时触发 CD-07 的连锁错误
  read_varint 是 codec 层的根基函数——其正确性影响所有下游解码。
