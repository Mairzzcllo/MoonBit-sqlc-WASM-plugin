execution_notes: >
  修复方案：read_varint 在 remaining() <= 0 中断时不应返回部分结果。
  选项 A（推荐）：在 Decoder struct 增加 error 标记字段。
  截断时设置 self.error = true，调用者检查标记。
  选项 B：改为返回 Option[Int]。改动面更大——所有 read_varint
  调用点（read_tag, read_string, read_bytes, read_bool,
  decode_embedded 等）均需改为 Option 处理。
  推荐选项 A：改动面最小，Decoder 的 error 标记可被下游
  decode_embedded (P1-049) 和 skip_field (P1-051) 复用。
  实现步骤：
  1. Decoder struct 增加 mut error: Bool = false
  2. read_varint: remaining() <= 0 时设置 self.error = true, 返回 0
  3. read_tag/read_string/read_bytes/read_bool/code_embedded:
     调用 read_varint 后检查 self.error，若为 true 则提前返回默认值
     或跳过处理
  4. 顶层 decode 函数（decode_generate_request）循环结束后检查标记
  执行顺序：本任务 → P1-049 → P1-051（共享 Decoder error 标记基础设施）。

  === FINAL COMPLETION (2026-06-04) ===
  read_varint 中 remaining() <= 0 时设置 self.error = true 并返回 0。
  read_tag/read_string/read_bytes/read_bool 在调用 read_varint 后
  检查 self.error，true 时提前返回默认值。顶层 decode 函数循环后
  检查 error 标记并 abort。新增 4 个截断检测测试。
  moon test 880/880 pass。
