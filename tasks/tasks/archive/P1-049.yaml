title: "decode_embedded 负长度静默失败 — 添加错误传播通道"
type: bugfix
priority: P1
description: >
  codec.mbt decode_embedded (line 239-250) 在 len < 0 或 len > remaining
  时创建空解码器并返回全默认值结构体，存在两层静默失败：

  1. 解码结果不可与真实空嵌入消息区分（全默认值）
  2. 父解码器 pos 未推进——嵌入消息的 payload 字节留在缓冲区，
     被下一个 read_tag 误解析为兄弟字段的字段号和线类型

  示例攻击路径：GenerateRequest 中 field 1 (Settings) 若其嵌入消息
  的 length varint 损坏产生负值，Settings 解码为空默认值，而 payload
  字节被当作 field 2 (catalog) 等的 tag 解析，导致后续字段全部错位。
  根因：解码器无错误返回通道——所有函数返回 T 而非 Result[T, Error]。
dependencies: []
