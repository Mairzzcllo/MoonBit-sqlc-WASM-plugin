id: P0-047
title: ':exec/:execrows + RETURNING * 语义修复 — 返回结果行而非 Int64'
priority: P0
type: fix
state: done
description: >
  当前 ExecResult/ExecCount 在 build_body/build_return_ty 中忽略
  result_shape：即使 build_result_shape 正确检测到 RETURNING * 列，
  codegen 仍返回 Result[Int64, DBError] 并调用 db.exec/db.execrows。
  修复后行为：
  - ExecResult + Rows(fields) → Result[RowType, DBError] + db.query_row + T::decode
  - ExecResult + None → Result[Int64, DBError] + db.exec（保持现状）
  - ExecCount + Rows(fields) → Result[Array[RowType], DBError] + db.query + collect
  - ExecCount + None → Result[Int64, DBError] + db.execrows（保持现状）
