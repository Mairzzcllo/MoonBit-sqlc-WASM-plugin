id: P0-034
title: Type Mapping 类型映射完善
priority: P0
type: fix
status: 待办
description: >-
  修复 plugin/type_map.mbt 中 6 个类型映射缺陷：

  HIGH #5 — BIGSERIAL/SERIAL/SMALLSERIAL 未映射。这三个 PostgreSQL
  自增类型在 match 中无条目，全部回退为 String。SERIAL->Int，
  BIGSERIAL->Int64，SMALLSERIAL->Int。对应 PG 类型 OID 也应一并添加。

  HIGH #6 — Schema 限定类型名未处理。sqlc 可能发送 "pg_catalog.int8"
  等带 schema 前缀的类型名，当前 match 只匹配裸名如 "int8"。
  需剥离 schema 前缀（pg_catalog. 等）再匹配，或添加 schema 限定条目。

  HIGH #7 — 完整 SQL 类型名含空格未覆盖。"timestamp with time zone"
  （空格分隔）等完整格式名缺失，而 PG 驱动可能发送完整名而非 "timestamptz"
  缩写。需补充 "timestamp with time zone"→"timestamptz",
  "double precision"→"double", "character varying"→"varchar" 等标准映射。

  MEDIUM #27 — interval 映射为 String 无注释说明。MVP 决策（暂用 String
  占位，后续可能映射为 Duration/Int64）未代码注释记录。添加注释说明
  MVP 决策背景和预期优化方向。

  LOW #32 — 类型匹配大小写敏感。sqlc 可能发送 "INT4"（大写）但当前 map
  只匹配 "int4"（小写）。将 match 统一转为大写或小写后再匹配，
  或添加大写别名条目。

  LOW (隐含) — numeric/decimal→Double 精度损失。PostgreSQL numeric(1000,0)
  可存约 1000 位数字而 Double 仅 15-17 位有效数字。暂保留 Double 但添加
  注释说明精度限制和未来改用 String 或 Decimal 类型的可能。
