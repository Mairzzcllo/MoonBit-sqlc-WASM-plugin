id: P0-035
title: IR 层数组与 RETURNING* 支持
priority: P0
type: fix
status: 待办
description: >-
  修复 plugin/ir.mbt 中 2 个缺陷，它们是 codegen 正确性的前提：

  HIGH #11 — adapt_column_to_field 忽略 is_array。适配器函数
  adapt_column_to_field 将 AdaptColumn 转为 InternalField 时，
  只取了 col.ty.name 作为 Named(...) 类型，col.is_array 完全被忽略。
  对比之下 type_codegen.mbt 中 generate_struct_from_table 正确使用了
  is_array 包裹 Arr(...)。后果：通过 generate_types_from_tables 生成的
  Catalog struct 数组类型正确，但通过 generate_types_from_queries 生成
  的 Row struct 数组信息丢失（TEXT[] 变成 String）。

  修复：检查 col.is_array，为 true 时生成 Arr(Named(col.ty.name))
  而非裸 Named(col.ty.name)。同时确认 InternalField 支持 Arr 类型
  （已有 InternalType::Arr，应直接可用）。

  MEDIUM #21 — :exec 配合 RETURNING * 的行数据被丢弃。build_result_shape
  对 ExecResult/ExecCount 无条件返回 None，即使查询包含 RETURNING *
  子句（PG 特有，返回行数据的 DML）。PostgreSQL 的 INSERT/UPDATE/DELETE
  ... RETURNING * 有 ExecResult 或 ExecCount 语义，但同时返回行数据。

  修复：对于有非空 fields 的 ExecResult/ExecCount，不应硬编码 None。
  需判断 fields 是否为空：空→None；非空→Rows(fields)。这将同时影响
  下游 query_codegen 的返回类型和 body 生成逻辑（不再无条件 discarding
  exec）。注意 P0-036 需同步适配此变更。
