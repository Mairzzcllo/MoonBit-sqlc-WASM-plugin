id: P1-027
title: sqlc.yaml 配置中 "package:" 键与 parse_plugin_options 不匹配
priority: P1
type: fix
state: done
description: >
  examples/users/sqlc.yaml:15 使用 "package: users" 作为 codegen options，
  但 adapter.mbt:151 parse_plugin_options 只认 "package_name=" 前缀。
  导致 package_name 永远是空字符串，用户配置不生效。
