execution_notes: >
  parse_plugin_options 增加 "package=" (无 _name 后缀) 的匹配支持。
  注意: MoonBit protobuf plugin_options 的输入格式是 key=value 逐行文本，
  兼容两种写法:
  - "package=users" (短格式)
  - "package_name=users" (长格式)
  同时更新 examples/users/sqlc.yaml 的 options 字段使用标准格式。
