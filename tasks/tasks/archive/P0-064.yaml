title: "输出路径路径穿越防护 — out_name 合法性验证"
type: bugfix
priority: P0
description: >
  process_request 中 filename 直接拼接 codegen.out + "/lib.mbt"。
  如果 out_name 包含 ".."（例如 "../../etc"）或绝对路径
  （"/tmp/foo"），生成文件可能写到当前工作目录外，属于
  路径穿越安全漏洞。需对 out_name 进行合法性校验，
  拒绝包含 ".." 或以 "/" 开头的路径。
