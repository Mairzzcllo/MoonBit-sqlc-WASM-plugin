id: P0-055
state: done
deterministic: true
title: "Fix NULL vs empty string: add null_mask to Row"
type: fix
priority: P0
description: >
  Row 当前使用 `get_fn: (Int) -> String` 无法区分空字符串和 NULL。非空 getter
  (get_string 等) 将空字符串误判为 TypeError，nullable getter 将 '' 误判为 None。
  修复方案：Row 新增 `null_mask: Array[Bool]` 字段，`Row::is_null(index)` 方法，
  所有 getter 改用 null_mask 判断空值。同步更新 runtime 内联构造、integration test
  副本、golden 测试。
