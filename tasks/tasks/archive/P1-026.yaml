id: P1-026
title: RETURNING * semantic — codegen 检查 result_shape 生成 decode 路径
priority: P1
type: fix
state: done
description: >
  IR 层 build_result_shape 已正确判断 ExecResult/ExecCount 有列时返回
  Rows(fields)，但 codegen 层 build_body/build_return_ty 忽略了此信息。
  ExecResult 分支无条件走 conn.exec() 返回 Result[Int64, DBError]，
  需要改为在有 Rows(fields) 时生成类型化解码路径。
