execution_notes: >
  修改点:
  1. build_return_ty(cmd, result_type, result_shape): 当 cmd=ExecResult|ExecCount
     且 result_shape=Rows(fields) 时，返回 Parameterized("Result", [Named(result_type), Named("DBError")])
  2. build_body 对 ExecResult+Rows(fields) 走 match conn.query() {..} + decode 路径
     而非 conn.exec()
  3. ExecCount+Rows(fields) 类似处理
  4. 测试: 在 query_codegen.mbt 新增 test 验证 ExecResult+Rows(fields) 生成 decode 调用
