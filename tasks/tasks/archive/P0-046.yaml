title: 查询注解补全 — :copyfrom / :batch / :execlastid
priority: P0
type: feature
state: done
description: >
  新增三个缺失的 sqlc 查询注解支持：:copyfrom（PostgreSQL COPY FROM）、:batch
  （批量执行）、:execlastid（MySQL 最后插入 ID）。
  当前这些注解在 parse_query_cmd 中被 catch-all 降级为 :exec，
  导致语义丢失。需要全链路：adapter → IR → codegen → runtime。
