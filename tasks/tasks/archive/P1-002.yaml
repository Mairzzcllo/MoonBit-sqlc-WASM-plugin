title: "row.mbt: 补全数组类型 getter 覆盖"
type: fix
priority: P1
description: >
  runtime/row.mbt 只实现了 decode_array_string、decode_array_int64 及对应的
  nullable 变体，缺少 decode_array_bool/decode_array_double/decode_array_date/
  decode_array_datetime/decode_array_decimal/decode_array_bytes 共 6 个函数及
  各自的 nullable 版本。当用户查询返回 Bool[]、Double[] 等数组列时生成代码
  引用不存在的函数导致编译失败。

