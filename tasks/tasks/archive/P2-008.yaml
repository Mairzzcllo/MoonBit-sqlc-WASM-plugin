id: P2-008
title: Transaction codegen 精确分发 — 只生成 Transaction 支持的方法
priority: P2
type: refactor
state: done
description: >
  当前 generate_query_fns 对每个查询生成 db: DB 和 tx: Transaction
  两个重载（代码翻倍），但 Transaction 只有 4 个方法
  (exec/execrows/query/query_row)，不支持 copyfrom/batch/execlastid。
  需要按 raw_cmd 精确分发。
