execution_notes: >
  修改 generate_query_fns:
  1. 定义 raw_cmd → Transaction 支持集:
     [One, Many, Exec, ExecRows] → 生成 tx 重载
     [CopyFrom, Batch, ExecLastId] → 跳过 tx 重载
  2. 对支持的方法: 生成 tx 重载 (conn_name="tx", conn_ty=Named("Transaction"))
  3. 对不支持的方法: 仅生成 db 重载
  4. 测试: 验证 CopyFrom/Batch/ExecLastId 只生成 1 个 fn (而非 2 个)
