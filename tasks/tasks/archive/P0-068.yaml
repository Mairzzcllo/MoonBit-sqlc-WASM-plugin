title: "修复 scratch/.data 内存重叠 — 动态分配 I/O 缓冲区替代固定地址"
type: bugfix
priority: P0
description: >
  wasi_io.mbt 中 scratch 缓冲区固定为 [1036, 65535]，MoonBit .data 段
  起始在 10000+，TLSF 元数据在 13136+——均位于 scratch 范围内。
  当 read_all 读取超过 8964 字节的 protobuf 输入时，fd_read 直接将
  数据写入 scratch 区域，覆盖 .data 段和 TLSF 分配器元数据，导致
  内存损坏、panic 或静默错误。
  当前 verify_reserved_memory() 仅保护 [1024,1035] iovec 区域，
  完全不验证 scratch 与 .data/TLSF 之间无重叠。
  memory_grow 在 total > 60404 时触发，但 .data 在 8964 字节
  即被覆盖——保护缺口达 6.7 倍。
  根因：设计假设 scratch [1036, 65535] 为"空闲"内存，与 .data
  和 TLSF 元数据的实际位置矛盾。注释声明 "no overlap" 实际上错误。
