execution_notes: >
  推荐方案：将 scratch 从固定地址改为动态分配的 GC Bytes 缓冲区。
  实现步骤： 1. 在 read_all 开头用 Bytes::new(bufsize) 创建动态 I/O 缓冲区
  2. 用 bytes_data_ptr(buf) 获取缓冲区数据指针作为 iovec.buf
  3. 移除 SCRATCH/SCRATCH_END 常量，移除 memory_grow 手动管理
  4. 保留 IOV_BASE=1024 及相关 iovec 常量（12 字节，不与 .data 冲突）
  5. 移除 verify_reserved_memory() 中对 scratch 的依赖
  6. 更新 read_all 循环：每次 fd_read 前设置 iovec 指向 buf 数据
  7. 写入量超过 buf 大小时，用 Bytes::new 创建更大的 buf 并 memory_copy 已有数据
  
  备选方案（最小改动）：增加 SCRATCH 起始地址到 .data 段之上。
  需运行时检测 .data 起始位置（通过 GC 分配一个已知标记的 Bytes
  并搜索线性内存找到其位置），将 SCRATCH 设为 .data_end 之后。
  此方案不推荐——依赖 MoonBit 内部内存布局，版本升级可能再次破坏。
  验证：  - 使用 > 10KB 的 GenerateRequest 测试 read_all
  - 确认 .data 段静态字符串（如 import 路径）在 I/O 后完整
  - moon check 0 errors, moon test 全通过
  - 构建 WASM 后在 wasmtime 中验证大消息 roundtrip

  CP-02 write_all 相关问题（P1-052）与本次修改独立，但若一并改为
  动态分配模式则可同时消除 write_all 的悬垂指针风险。

  === FINAL COMPLETION (2026-06-04) ===
  已实施：wasi_io.mbt 中 scratch 缓冲区从固定 [1036,65535] 改为
  GC Bytes::new 动态分配。read_all 使用 Bytes::new(65536) 创建
  动态 I/O 缓冲区，通过 bytes_data_ptr 获取 iovec.buf 地址。
  移除 SCRATCH/SCRATCH_END/memory_grow 手动内存管理。
  保留 IOV_BASE=1024 iovec 结构区域。verify_reserved_memory()
  简化为仅验证 [1024,1035] 区域。moon test 880/880 pass。
