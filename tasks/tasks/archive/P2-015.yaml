title: "trim_str 扩展 Unicode 空白字符支持"
type: refactor
priority: P2
description: >
  plugin/adapter.mbt trim_str (lines 414-425) 仅处理空格、制表符、
  换行、回车四种 ASCII 空白字符，不处理其他 Unicode 空白字符
  （如 \x0B 垂直制表符、\x0C 换页符、Unicode 不间断空格等）。

  MoonBit String 当前无内置 trim 方法，但可通过 Char 类型方法扩展。
