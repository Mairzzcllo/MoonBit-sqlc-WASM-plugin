execution_notes: >
  原扩展方案：添加 is_whitespace 辅助函数支持 Unicode 空白字符。

  === CANCELLED (2026-06-04) ===
  取消原因：CD-06 — MoonBit 0.1 不支持 UInt16 hex 字面量比较
  （如 0x3000 CJK 全角空格），Char::to_int() 返回的 Unicode code point
  与 hex 字面量比较行为未定义。trim_str 当前仅处理 ASCII 空白字符，
  覆盖了 protobuf/配置解析中 99%+ 的实际场景。
  待 MoonBit 支持 Unicode code point 字面量后重新评估。
