execution_notes: >
  修复方案（按推荐程度排序）：

  1. （最简）在 bytes_data_ptr 调用后添加 data 的具名引用：
     let _keep_alive = data // 阻止编译器删除 data 的 GC 引用
     或在 while 循环内引用 data.length() 保持存活。
     缺点：脆弱——编译器优化可能消除无副作用调用。
  2. 将 write_all 改为在参数 data 上操作而非 raw ptr。
     使用 data[index] 逐字节访问代替 ptr+offset 内存操作。
     缺点：逐字节访问性能低于 memory_copy。
  3. 与 P0-068 联动：若 scratch 改为动态 Bytes 分配，read_all
     返回的 Bytes 自然存活，write_all 使用完毕。

  推荐：方案 1（最小改动），同时在每次 read_all/write_all 调用中
  确保 Bytes 不被释放。
  验证：构建 WASM 后在 wasmtime 中执行完整 roundtrip 测试，
  确认响应数据完整性。因 moonrun 使用 wasm-gc（不同 GC 模型），
  仅在 wasmtime 环境中可验证。

  === FINAL COMPLETION (2026-06-04) ===
  write_all 在 bytes_data_ptr(data) 调用后添加 let _keep_alive = data
  具名引用，在 while 循环体内引用 data.length() 双重保活。
  read_all 函数同步添加 _keep_alive 引用保护。
  P0-068 动态 Bytes 分配方案从架构层面消除此风险类型。
  moon test 880/880 pass。wasmtime roundtrip 验证数据完整性。
