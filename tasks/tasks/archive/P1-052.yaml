title: "write_all bytes_data_ptr 悬垂指针风险 — 保持 Bytes 引用存活"
type: bugfix
priority: P1
description: >
  write_all (wasi_io.mbt:124-138) 中 data 参数在 bytes_data_ptr(data)
  调用后不再具名引用，函数随后进入含 fd_write 宿主调用的 while 循环。
  MoonBit 编译器判定 data 于此行后已死，GC 可能回收其底层内存，
  raw ptr 成为悬垂指针——写入 stdout 的响应数据可能被静默替换为垃圾。
  read_all 和 check_bytes_data_ptr 中类似模式当前风险较低（前者 buf
  随后被返回保持存活，后者循环体内无 HC 调用）。write_all 是唯一
  同时满足"参数名死亡 + 长循环 + 宿主调用"的路径。
