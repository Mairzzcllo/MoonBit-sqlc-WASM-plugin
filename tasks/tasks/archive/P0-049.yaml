title: "修复 get_bytes 非 ASCII 字节损坏 (C1)"
type: fix
priority: P0
description: >
  Row 内部改用 Array[Byte] 存储原始字节数据，避免 MoonBit String UTF-16LE
  存储导致 raw[i].to_byte() 对 >=0x80 字节高位丢失。3 处修复：get_bytes
  (line 436-443)、decode_array_bytes (250-252)、decode_nullable_array_bytes (394-396)。
