execution_notes: >
  Row 内部 raw 字段从 String 改为 Array[Byte]。影响：Row::new() 输入调整为
  Array[Byte]，get_bytes 直接返回 raw（转为 Array[Byte]），decode_array_bytes
  和 decode_nullable_array_bytes 直接索引 raw[i] 避免 UTF-16 转换。
  get_string 等文本 getter 需 raw → String 转换（从 UTF-16LE 字节构建）。
