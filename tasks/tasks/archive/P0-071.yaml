execution_notes: >
  run_io_loop L178-185: check_bytes_data_ptr() 和 verify_reserved_memory()
  如果失败应以安全方式处理，不 crash。
  方案 A: 将 panic() 替换为 abort() — abort 仍然会 trap，但至少是明确的
  方案 B: 将 check 变为返回 Bool，失败时 run_io_loop 返回空 — 推荐
  方案 C: 移除运行时哨兵，仅在 CI/启动测试中验证
  推荐 B: check 失败时跳过 I/O，sqlc 收到空响应会报告 "plugin returned no files"
