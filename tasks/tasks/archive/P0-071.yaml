title: "wasi_io panic() → 错误信号替代 — 防止内存哨兵崩溃"
type: fix
priority: P0
description: >
  将 wasi_io.mbt 中 4 处 panic() 替换为安全的 abort 或优雅降级。
  check_bytes_data_ptr (L55) 和 verify_reserved_memory (L164,168,172)
  在 GC/内存布局变化时直接 panic 崩溃。
  修复方案：check_bytes_data_ptr 改为跳过 I/O 循环（返回空 data），
  verify_reserved_memory 改为跳过（或仅记录），不 crash。
  这些是防御性检查，执行环境固定（wazero/wasmtime），
  crash 比正确性错误的风险更大。

