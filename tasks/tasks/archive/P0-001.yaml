title: "类型映射统一：int4/serial/smallint → Int64"
type: fix
priority: P0
description: >
  map_pg_name 将 int4/integer/serial/smallint/smallserial 映射为 MoonBit Int，
  但 type_to_value_constructor 将同一组类型映射为 Int64 变体，导致生成代码中
  struct 字段类型 (Int) 与 Value 构造函数 (Int64(id)) 不匹配。修复 map_pg_name
  改为 Int64，统一为 64 位整型避免隐式转换问题。

