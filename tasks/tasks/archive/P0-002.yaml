execution_notes: >
  关键约束：(1) MoonBit .data 在 10000+，TLSF 在 13136+，memory.grow 新增页
  从 65536+ 开始无冲突；(2) 需动态跟踪 current_scratch_end；(3) memory.copy
  用 WAT 内联 "(memory.copy)" 指令；(4) retry read_all 循环中检测 total 接
  近 current_scratch_end - SCRATCH 时触发 grow；(5) 考虑初始 60KB + 每 60KB
  步进增长。
