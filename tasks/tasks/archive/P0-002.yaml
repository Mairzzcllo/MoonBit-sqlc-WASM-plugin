title: "WASM I/O：memory.grow 动态缓冲区 + memory.copy"
type: fix
priority: P0
description: >
  read_all 硬限制 60KB 缓冲区，大请求被静默截断；且逐字节拷贝性能差。
  修复方案：(a) 检测请求 > 60KB 时用 memory.grow 动态扩展 scratch 区；
  (b) 用 WAT memory.copy 指令替代逐字节循环拷贝。
  涉及 wasi_io.mbt 中 read_all/write_all 和 WAT 内联块。

