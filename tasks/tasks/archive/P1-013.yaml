description: >-
  moon check 警告：
  "Main package uses blackbox-only test inputs (_test.mbt files).
   Main packages will stop generating blackbox tests in
   a future release."

  plugin 是 `is-main: true` 的 main 包，但目录中存在
  _test.mbt 文件（黑盒测试）。MoonBit 未来版本将不再支持
  main 包的黑盒测试。

  修复方案（二选一）：
  a. 将 _test.mbt 中的测试用例全部迁移到 inline `test {}` 块
     （当前大部分测试已使用此模式）
  b. 将公共行为移到非 main 包（如 plugin/core 子包），
     保留 main 包仅作为入口点

  优先选方案 a，改动最小。
