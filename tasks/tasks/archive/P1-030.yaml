  max: 3
created_at: 2026-05-26
updated_at: 2026-05-26
related: []
references:
  - runtime/row.mbt
execution_notes: >
  重构 get_time 解析:
  1. 先 split(":") 取小时/分钟
  2. 秒部分再 split(".") 分离整数秒和小数
  3. 小数部分按需填充/截断到 6 位 (micros):
     - 空 → 0
     - 少于 6 位 → 右补零
     - 多于 6 位 → 截断到 6 位
  4. try/catch 包裹整个解析，失败时返回 TypeError
  5. 测试: 覆盖 HH:MM:SS / HH:MM:SS.f / HH:MM:SS.123456 三种格式
