id: P1-030
title: Row::get_time 解析格式容错处理
priority: P1
type: fix
state: done
description: >
  runtime/row.mbt:195-207 的 get_time 假设输入严格为 HH:MM:SS.micros 格式，
  但 PostgreSQL time 输出格式依赖于 DateStyle 设置，可能为 HH:MM:SS（无小数）
  或 HH:MM:SS.frac_trailing_zeros。当前硬编码 split 逻辑脆弱。
dependencies:
  hard: []
  soft: []
