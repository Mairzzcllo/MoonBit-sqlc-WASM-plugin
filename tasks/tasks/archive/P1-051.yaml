execution_notes: >
  修复方案（分层）：
  1. 未知 wire type (6+)：由于无法推断字段边界，保持当前行为（跳到
     message end），但通过 P1-050 的 Decoder error 标记通知调用者
     发生了截断，而非静默。
  2. WT_LEN/WT_BITS64/WT_BITS32 OOB：同样设置 error 标记后跳到 end。
  3. 重要：WT_LEN OOB 分支中 new_pos < self.pos 的检查（溢出保护）
     是必要的，保留。
  依赖 P1-050 引入的 Decoder error 标记。实现后，顶层 decode 函数
  在循环结束后检查标记，可记录 warning 或调用 abort。
  验证：新增测试验证未知 wire type/越界场景中 error 标记正确设置。

  === FINAL COMPLETION (2026-06-04) ===
  skip_field 未知 wire type (6+) 分支保留跳至 message end 行为，
  但新增 self.error = true 标记通知调用者发生截断。
  WT_LEN/WT_BITS64/WT_BITS32 OOB 分支同步设置 error 标记。
  保留 new_pos < self.pos 溢出保护检查。新增 3 个 error flag 测试。
  moon test 880/880 pass。
