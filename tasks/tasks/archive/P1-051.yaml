schema_version: "1.0"
id: P1-051
state: done
deterministic: true
title: "skip_field 未知 wire type 边界加固"
type: bugfix
priority: P1
description: >
  codec.mbt skip_field (line 190-227) 遇到未知 wire type 时执行
  self.pos = self.end，跳至当前消息边界末尾，导致所有兄弟字段丢失。
  例如 GenerateRequest 解码中，若 field 2 (catalog) 因消息损坏使用
  非标准 wire type 6，fields 3-6 (queries/sqlc_version/plugin_options/
  global_options) 全部被静默丢弃，解码为默认空值。
  此外，WT_LEN/WT_BITS64/WT_BITS32 越界时同样跳到 end，丢失后续字段。
  这些分支已添加 OOB 检查（P0-061），但全跳到 end 的行为过于激进。
  根因：未知 wire type 缺乏解析器可推断的字段边界信息，当前策略是
  "放弃整个消息"——这是一种 fail-close 策略，但在部分损坏的消息中
  会导致大量正确数据丢失。
