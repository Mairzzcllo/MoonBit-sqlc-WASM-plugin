execution_notes: >
  read_byte (L107): 将 abort 改为 self.error = true; 返回 0.to_byte()
  read_string (L142): 将 abort 改为 self.error = true; self.pos = start; 返回 ""
  read_bytes (L155): 同上模式返回 Bytes::default()
  read_fixed32 (L170): self.error = true; 返回 0
  read_fixed64 (L183): self.error = true; 返回 0L
  decode_generate_request (L877): 循环后 if dec.has_error() { /* 返回空结构体或最小有效 request */ }
  所有调用 read_*/decode_* 的高级 decoder 已通过 P1-049~051 设置了 error 传播
  MoonBit abort() 是宿主环境 trap — MoonBit 0.1 无办法在 MoonBit 层捕获
  最终防线: process_message 的 try/catch 可捕获 MoonBit raise，但 abort 穿透一切

  === FINAL COMPLETION (2026-06-15) ===
  5 处 abort() 全部替换为 Decoder.error flag + 安全默认值。
  decode_generate_request 循环后 has_error() → raise Failure::Failure。
  decode_request 签名加 raise；process_message catch 返回空 GenerateResponse。
  新增 7 个 P0-070 测试（codec 6 + protocol 1）。
  moon check 0 errors; moon test 887/887; moon build --target wasm OK;
  validate_plugin.ps1 6 pass / 0 fail (sqlc generate skipped).
