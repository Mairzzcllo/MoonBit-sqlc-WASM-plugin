schema_version: "1.0"

id: P0-070
state: done
deterministic: true

title: "codec abort() → 优雅错误返回 — 防止 WASM trap 崩溃"
type: fix
priority: P0
description: >
  将 codec.mbt 中 5 处 abort() 替换为 Decoder error flag + 安全返回值。
  当前 abort() 触发 WASM trap 绕过 protocol.mbt 的 try/catch 包装，
  导致 sqlc 宿主收到 crash 而非 GenerateResponse 错误。
  修复方案：read_byte/read_string/read_bytes/read_fixed32/read_fixed64
  在越界/长度溢出时设置 self.error = true + 返回默认值（""/空 Bytes/0），
  decode_request 在解码循环后检查 error flag 并返回字段缺失的 request
  （或 protocol.mbt 的 try/catch 层在顶层捕获并返回空 GenerateResponse）。

