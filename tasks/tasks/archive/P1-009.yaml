id: P1-009
title: 迁移 inspect() → Debug::inspect() 禁用 API 警告
priority: P1
type: refactor
state: done
description: >-
  moon check 报告 5 处 deprecated inspect() 调用，
  需要迁移到 Debug::inspect()：

  - plugin/ast.mbt:195 — inspect(s.fields[1].doc, content="Some(user email)")
  - plugin/ast.mbt:233 — inspect(i.import_alias, content="Some(builtin)")
  - plugin/ast.mbt:238 — inspect(i.import_alias, content="None")
  - plugin/query_codegen.mbt:204 — inspect(fn_def.doc, content="Some(Get a user by ID)")
  - plugin/type_codegen.mbt:266 — inspect(sd.doc, content="Some(User profiles table)")

  修复方案：
  将 `inspect(value, content=...)` 替换为
  `Debug::inspect(value, content=...)`，
  需在文件头部或 moon.pkg 中导入 `moonbitlang/core/debug`。
