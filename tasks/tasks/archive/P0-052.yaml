description: >
  plugin/wasi_io.mbt:100 中 memory_grow(1) 的返回值被 let _ = 丢弃。
  当 WASM 内存达到上限时返回 -1，后续 fd_read 写入未分配内存导致静默
  数据损坏。需检查返回值并在失败时返回 Err。
