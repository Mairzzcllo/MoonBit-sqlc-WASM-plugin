execution_notes: >
  方案 A (推荐): 在每个调用 decode_embedded(f, decoder_fn) 的位置，调用后检查
  dec.has_error()。如果为 true，跳过当前字段的后续处理。
  涉及位置包括所有 decode_* 函数中的 decode_embedded 调用：
  decode_settings:12, decode_query, decode_column, decode_parameter 等
  当前这些函数已经通过 skip_field 跳过错误的嵌入消息，但返回的是带默认值的
  对象而非 None。改为当 has_error() 时返回 None 或保留当前 partial 返回。
  最简单修复: 在 decode_embedded 调用后检查 error，若 true 则 break/返回。
