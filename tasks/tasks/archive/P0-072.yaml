id: P0-072
state: done
deterministic: true

title: "decode_embedded 损坏长度 → error flag 通知 — 防止兄弟字段静默丢失"
type: fix
priority: P0
description: >
  当前 decode_embedded (codec.mbt:250-267) 在损坏长度时将 dec.pos 设为 dec.end，
  导致所有后续字段被丢弃无报告。虽然设置了 dec.error = true，但调用者无法
  获知丢失了多少字段。
  修复方案：设置 error flag 后在返回的默认值中包含错误标记（sub: Decoder
  已含 error: true），调用者（各 decode_* 函数）应检查 has_error()。
  P1-049 已建立 error 传播框架（decode_generate_request 循环后检查），
  但小粒度的 field-level decode 函数未检查 — 补全这些检查点。

dependencies:
