id: P1-025
title: 数组解码增强 — 从 stub String[] 到真实类型化解码
priority: P1
type: feature
state: done
description: >
  当前 get_array 返回 Array[String]（stub 实现），无法按元素类型解码。
  例如 text[] 应解码为 Array[String]，int4[] 应解码为 Array[Int]。
  需要根据列的元素类型生成正确的 decode_array_<type> 调用。
