execution_notes: >
  方案 (a): 在 Decimal/Uuid/Duration/Time/IpAddr 变体前加
  #[suppress(unused)] 注解，抑制 false positive 警告。
  方案 (b): runtime 内增加显式构造路径（如 Mock 场景使用），
  使编译器认为变体被引用。优先方案 (a) 因方案 (b) 增加无意义代码。
  MoonBit 注解语法: /// @suppress(unused_constructor) 或类似。
