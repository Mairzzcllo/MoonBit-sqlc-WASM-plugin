id: P1-014
title: "类型映射修复: int2/int4 → Int（当前 Int64）"
priority: P1
type: fix
state: done
description: >-
  PostgreSQL int2 和 int4 目前被映射到 MoonBit Int64，
  导致不必要的 64 位宽度。
  正确映射应为 moonbitlang/core 的 Int 类型（平台原生字宽）。

  修复文件：plugin/type_map.mbt
  修改 PostgreSQL 类型映射表中 int2/int4/smallint/integer 的
  目标类型从 `Named("Int64")` 改为 `Named("Int")`。
  需同步更新 golden test 中的预期输出。

  不影响 int8/bigint/serial8/bigserial → Int64（正确）。
