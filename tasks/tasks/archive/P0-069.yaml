description: >
  emit_sql_as_comment 选项的默认值在文档和代码中不一致：

  - 代码（adapter.mbt:158,200,219,954）：默认 true
  - README.md:157：文档写默认 false

  四个独立代码位置均确认真实默认为 true:
  - struct doc comment: "(default: true)"
  - parse_plugin_options 空数据返回 emit_sql_as_comment: true
  - 可变初始值 let mut emit_sql_as_comment = true
  - 单元测试: "emit_sql_as_comment default true when not set"

  需要决定统一为 true 还是 false。由于生成代码中嵌入 SQL 作为 doc
  comment 是 sqlc 生态的通用做法，且有独立选项控制，默认 true 更合理。
  需更新 README 文档。
