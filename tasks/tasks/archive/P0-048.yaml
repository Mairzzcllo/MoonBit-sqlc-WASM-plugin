id: P0-048
title: 事务集成 — 生成函数同时支持 DB 和 Transaction
priority: P0
type: feature
state: done
description: >
  当前所有生成函数签名固定为 fn query_xxx(db: DB, ...)，无法传入 Transaction。
  用户需要手动 wrap。由于 MoonBit 0.1 不支持 trait 对象，采用生成两个重载的方案：
  为每个查询函数生成 fn query_xxx(db: DB, ...) 和 fn query_xxx(tx: Transaction, ...)，
  两者共享 body AST（DB 和 Transaction 的 exec/query/query_row/execrows 方法签名
  完全一致）。
dependencies:
  hard: []
  soft: []
lock:
  owner: null
  timestamp: null
  expires_at: null
retry:
  count: 0
  max: 3
created_at: 2026-05-25
updated_at: 2026-05-25
related: []
execution_notes: >
  修改 query_codegen.mbt:
  1. generate_query_fn 接受 type_param: String ("DB" 或 "Transaction")
  2. build_body 中的方法接收器名保持作为参数传入
  3. generate_query_fns 调用两次 generate_query_fn（一次 DB，一次 Transaction）
  4. 注意区分函数名避免冲突（可都用同名，MoonBit 支持重载）
  Runtime 的 Transaction struct 已完成（transaction.mbt），DB::begin() 已实现。
  无需修改 runtime/。
  新增 golden 测试验证生成代码包含 Transaction 重载。
