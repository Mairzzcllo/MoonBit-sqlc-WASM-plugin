title: "iovec 保留内存区间隔离验证与加固"
type: bugfix
priority: P0
description: >
  iovec 内存区间 [1024,1035] 和暂存区 [1036,65536] 是硬编码
  的保留内存地址，MoonBit 分配器变化可能导致重叠。
  当前 check_bytes_data_ptr 验证 Bytes 对象偏移 (+8)，
  但未验证保留区间与 MoonBit .data 段/TLSF 之间无重叠。
  需增强启动时验证：确认 1036+ 区域未被分配器使用，
  并在 memory_grow 后重新验证隔离边界。
