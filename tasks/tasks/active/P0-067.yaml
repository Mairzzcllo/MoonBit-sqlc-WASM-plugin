execution_notes: >
  Edge case #10 from boundary analysis. Add runtime assertion
  at startup: verify that Bytes::new(1) returns pointer > 65536
  (above reserved region). Also verify after memory_grow.
  This is a safety net — actual collision risk is low because
  MoonBit .data starts at 10000+ and TLSF at 13136+.
