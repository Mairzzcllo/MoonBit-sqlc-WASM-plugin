id: P0-037
title: 输出配置与导入声明
priority: P0
type: fix
status: 待办
description: >-
  修复 plugin/main.mbt 和 plugin/moon.pkg 中 3 个配置相关缺陷：

  HIGH #23 — 输出文件名硬编码为 "lib.mbt"。process_request 中 files
  数组固定 [{ name: "lib.mbt", contents: source }]。sqlc 配置中的
  codegen.out 目录和文件名完全被忽略。用户无法自定义输出路径。

  修复：从 GenerateRequest.settings.codegen.out 提取输出目录/文件名。
  若 out 为空，默认 "lib.mbt"（向后兼容）。若 out 为目录路径，自动
  生成 <query_file_name>.mbt。考虑多文件输出（类型定义与查询函数分离）。

  HIGH #24 — codegen.options 完全被忽略。sqlc v2 配置中 codegen 的
  options 字段可用于传递包名、编码风格等参数，当前 process_request
  的 pipeline 完全不使用 options。

  修复：从 GenerateRequest.codegen.options 中读取 package_name 等
  配置项。将包名注入生成的 SourceFile（用于 package 声明）。
  设计 options 扩展方式：定义一个 Options 结构体，用 proto-like
  map<string,string> 初始化，在 codegen 管线中传递。

  MEDIUM #25 — 插件不依赖 runtime（无编译期验证）。生成代码引用
  runtime 包中的 DB、Row、Decoder 等类型，但 plugin/moon.pkg 中
  未声明对 runtime 的依赖。插件与 runtime 的接口版本在编译期无校验。

  修复：在 plugin/moon.pkg 中添加 runtime 依赖声明。同时为 runtime
  定义版本常量，在 plugin 初始化时校验兼容性（或由 moon build 解决）。
  若 MoonBit 不支持包版本约束，至少添加编译期引用验证（如调用
  runtime 的某个函数确保其存在）。
