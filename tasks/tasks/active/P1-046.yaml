title: "Row 运行时加固 — 索引越界 + 类型混淆 + collect 挂起"
type: bugfix
priority: P1
description: >
  Row 运行时 3 个问题：Row.get(index) 直接调 get_fn 闭包
  无边界检查，越界时行为由驱动定义（可能 panic）；
  get_json 对非 JSON 列将原始字符串当 JSON 解析，无类型
  验证；RowIter::collect 如果 next() 永不返回 Ok(None)
  则永久挂起。修复：Row.get 增加 index < 已知列数检查；
  get_json 增加类型前验证；collect 增加最大迭代次数保护。
