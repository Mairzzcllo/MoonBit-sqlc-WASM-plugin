title: "字段解码按索引而非列名 — 列顺序变化静默错位"
type: bugfix
priority: P0
description: >
  生成的 decode 方法按列索引顺序（get_int64(0),
  get_string(1), ...）读取 Row，而非按列名匹配。
  如果 sqlc 更改查询列顺序（例如 SELECT 子句顺序变化），
  生成代码静默将值映射到错误字段。需改为按列名解码
  或在 decode 中验证列元数据与字段对应关系。
