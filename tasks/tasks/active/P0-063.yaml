execution_notes: >
  Edge case #60. This is a design-level issue — the current codegen
  emits positional getter calls (index 0, 1, 2...). sqlc metadata
  provides column names but decode uses index. Fix requires either:
  (a) column-name-based Row getter, or (b) runtime column metadata
  in Row struct for validation. (a) is more robust but more invasive.
  Consider generating decode with column names in comments as
  intermediate step.
