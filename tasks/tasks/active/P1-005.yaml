id: P1-005
title: "Codegen: Decoder Rewrite + 参数绑定 + :one/:many/:execrows"
priority: P1
type: feature
status: 待办
description: >-
  重写 codegen 层以使用新版 runtime API：
  (1) type_codegen.mbt — generate_decode_fn 改用 typed getter
  （row.get_int64(0) 替代 @string.parse_int64(row.get(0)) catch { _ => 0 }），
  对于 nullable 列生成 row.get_nullable_int64(pos)；
  (2) query_codegen.mbt — build_body 按查询模式生成：
  :one → db.query_row(sql, params) + row decode → Result[T, DBError]，
  :many → db.query(sql, params) + iter.map(decode) → Result[Array[T], DBError]，
  :execrows → db.execrows(sql, params) → Result[Int64, DBError]；
  (3) build_return_ty 返回类型从 Option[T]/Array[T] 改为 Result 包装；
  (4) 参数绑定：由 IR params 构建 Array[Value] 的 AST 节点；
  (5) 更新 golden_test.mbt 的预期输出。
  注意：Decode 方法返回 Result[T, DBError] 以保留错误信息。
