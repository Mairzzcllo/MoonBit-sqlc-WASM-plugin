execution_notes: >
  Edge cases #5, #9, #11, #13 from boundary analysis.
  skip_field: add bounds check before pos movement.
  read_fixed32/64: validate remaining >= 4/8.
  process_message: wrap decode in try/catch, return empty response on error.
  Reserved region: add check_bytes_data_ptr verification on memory grow.
