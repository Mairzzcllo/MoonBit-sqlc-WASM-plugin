id: P0-038
title: WASM I/O 清理
priority: P0
type: refactor
status: 待办
description: >-
  清理 plugin/wasi_io.mbt 中 5 个缺陷。注意：ADR-008（内联 WAT FFI）
  已取代 WAT shim 方案，因此与 shim/ 相关的 #12 和 #33 已不再适用，
  不在本任务范围。本任务专注当前活跃的 wasi_io.mbt：

  MEDIUM #13 — run_io_loop() 和 fn main 是死代码。原 WAT shim 方案
  中 shim 接管了 __main_void 入口点，MoonBit 的 fn main 不被执行。
  ADR-008 迁移后应验证此问题是否已解决：检查 wasm2wat 输出中
  __main_void 是否指向 moonbit_main 包函数而非 shim 函数。若已解决，
  添加注释说明；若未解决，修复入口点链接。

  MEDIUM #14 — 字节拷贝是 O(n²) 低效实现。目前的 inline WAT 循环使用
  逐字节 load_u8 后 store_u8，每条指令处理 1 字节。对于数百 KB 的
  protobuf payload，这是不必要的开销。

  修复：若 MoonBit 支持 i32.load/i32.store 或 i64.load/i64.store，
  改为 4/8 字节批量拷贝，剩余尾部字节逐字节处理。若 inline WAT 支持
  memory.copy 指令（WASI 环境通常支持），直接用 memory.copy 实现
  最优 O(n) 拷贝。

  LOW #29 — SCRATCH 常量未使用。wasi_io.mbt 定义了 SCRATCH = 1036
  但从未被显式引用。检查：SCRATCH 区域实际被 write_frame 中的 stderr
  debug dump 隐式使用。若 debug dump 被清理（P0-039），SCRATCH 真正
  成为死代码，应一并删除或添加注释说明用途。

  LOW #30 — fd_read/fd_write 错误被忽略。WASI I/O 调用的返回值（errno）
  被丢弃。fd_read 返回 -1 时 read_body 继续处理无效数据。fd_write
  返回错误时 write_frame 静默失败。

  修复：检查返回值，非零时打印诊断（通过 stderr fd_write）或返回
  空响应。至少对 CRITICAL 错误（如 fd=EBADF）不应静默。

  LOW #31 — 每轮读 4KB 分配两次浪费内存。read_frame 流程：1) 分配
  Bytes::new(len) 存储结果；2) fd_read 直接写入；3) 返回此 Bytes。
  但中间有 Bytes::new(4096) 作为读缓冲区的分配。全读时重复分配。

  修复：避免中间临时分配。若 fd_read 支持直接读入目标 buffer
  （当前 bytes_data_ptr 方案已实现），消除冗余分配。
