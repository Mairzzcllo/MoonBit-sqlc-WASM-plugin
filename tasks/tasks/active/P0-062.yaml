description: >
  :one 查询返回 2+ 行时，当前第 2+ 行被静默丢弃，
  直接返回第 1 行的解码结果。需要在 runtime 新增
  TooManyRows 错误变体，或由驱动在 query_row 实现中
  检查行数 > 1 时返回错误。目前所有 query_row_fn 实现
  无此检查，属于数据正确性问题。
