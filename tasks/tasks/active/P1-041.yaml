title: "命名转换边缘情况加固 — 重复/冲突/特殊字符"
type: bugfix
priority: P1
description: >
  snake_to_pascal 的 5 个边缘情况：不同下划线命名映射到
  相同 PascalCase（如 "user_name" 和 "UserName" 冲突）；
  枚举名与 struct 名冲突产生编译错误；"user__name" 双下
  划线折叠；"_user" 前导下划线丢失；"USER_NAME" 全大写
  映射为 "USERNAME" 而非 "UserName"；"userName" 驼峰不
  处理。需补全测试用例，修复或文档化这些行为。
