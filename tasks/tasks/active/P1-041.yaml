execution_notes: >
  Edge cases #50, #51, #54, #55, #56, #57, #58, #59.
  Current snake_to_pascal behavior:
  - "user__name" → "UserName" (double underscore folded by split)
  - "_user" → "User" (split produces ["", "user"])
  - "USER_NAME" → "USERNAME" (split produces ["USER", "NAME"])
  - "userName" → "userName" (no underscore → unchanged)
  Need to decide on normalization policy first (ADR-004 update).
