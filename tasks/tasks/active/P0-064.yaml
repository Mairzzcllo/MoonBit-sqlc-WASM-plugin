execution_notes: >
  Edge case #89. Add validate_output_path function in main.mbt
  or adapter.mbt. Sanitize: reject paths with ".." segments,
  reject absolute paths (starts with "/" or "\\").
  Optionally: sanitize to alphanumeric + underscore + slash only.
